<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bolão da Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#08180F; --panel:#0E2A1B; --panel2:#102f1f; --line:#1C4A30;
    --grass:#23C964; --gold:#F5C518; --cream:#EFF4EE; --muted:#88AE99;
    --coral:#FF5A5F; --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:radial-gradient(900px 420px at 50% -10%, #133a25 0%, transparent 60%),var(--pitch);
    color:var(--cream);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.45;
    padding:0 0 50px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px}

  header.board{position:relative;overflow:hidden;margin:0 0 16px;border-bottom:3px solid var(--gold);
    background:linear-gradient(180deg,#0c2417,#0a1d12)}
  header.board::before,header.board::after{content:"";position:absolute;top:0;bottom:0;width:50%;
    background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 20px,transparent 20px 40px)}
  header.board::before{left:0}header.board::after{right:0}
  .board .inner{position:relative;padding:20px 14px 16px;text-align:center}
  .eyebrow{font-weight:700;letter-spacing:.3em;font-size:10px;color:var(--gold);text-transform:uppercase}
  h1{font-family:Anton;font-weight:400;margin:4px 0 2px;font-size:clamp(30px,11vw,54px);line-height:.92;
    text-transform:uppercase;text-shadow:0 2px 0 #06120b}
  h1 .ball{color:var(--grass)}
  .leadline{font-size:12.5px;color:var(--muted);margin-top:7px}
  .leadline b{color:var(--cream)}

  .me{display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 16px}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600}
  .pill b{color:var(--grass)}
  .linkbtn{background:none;border:none;color:var(--gold);font:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline;padding:0}

  .section-h{font-family:Anton;font-weight:400;letter-spacing:.05em;text-transform:uppercase;
    font-size:20px;margin:22px 0 12px;display:flex;align-items:center;gap:10px}
  .section-h .dot{flex:1;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}

  .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:8px;align-items:end;margin:0 0 14px}
  .step{background:var(--panel);border:1px solid var(--line);border-radius:13px 13px 0 0;padding:12px 6px;text-align:center}
  .step .pos{font-family:Anton;font-size:26px;line-height:1}
  .step .nm{font-weight:800;font-size:13px;margin-top:5px;word-break:break-word}
  .step .pt{font-family:Anton;font-size:20px;margin-top:3px}
  .step.s1{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 10px 22px rgba(245,197,24,.12);padding-bottom:28px}
  .step.s1 .pos{color:var(--gold)} .step.s2 .pos{color:#cfd8d3} .step.s3 .pos{color:#e0b083}

  .rrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:13px;padding:11px 13px;margin-bottom:8px;transition:.12s}
  .rrow.hl{background:rgba(35,201,100,.10);border-color:var(--grass)}
  .rpos{font-family:Anton;font-size:20px;min-width:34px;text-align:center;color:var(--muted)}
  .rmid{flex:1;min-width:0}
  .rname{font-weight:800;font-size:15px}
  .rsub{font-size:11.5px;color:var(--muted);margin-top:1px}
  .rpts{font-family:Anton;font-size:26px;color:var(--gold);line-height:1;text-align:right}
  .rpts span{display:block;font-family:Inter;font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}

  .tabs{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:9px 14px;font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:.12s}
  .tab.on{background:var(--grass);border-color:var(--grass);color:#062012}
  .tab .ld{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--coral);margin-left:6px;vertical-align:middle;animation:blink 1.1s infinite}
  @keyframes blink{50%{opacity:.25}}

  .game{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin:0 0 11px;overflow:hidden}
  .game .top{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;
    background:var(--panel2);border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);font-weight:700}
  .badge{font-size:9.5px;padding:2px 8px;border-radius:999px;font-weight:800;letter-spacing:.08em}
  .badge.open{background:rgba(245,197,24,.16);color:var(--gold)}
  .badge.done{background:rgba(35,201,100,.15);color:var(--grass)}
  .match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:13px 12px 6px}
  .team{display:flex;align-items:center;gap:8px;min-width:0}
  .team.away{justify-content:flex-end}
  .flag{font-size:23px;line-height:1}
  .tname{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .scorebox{display:flex;align-items:center;gap:7px}
  .rscore{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-family:Anton;
    font-size:22px;background:#06140c;border:1px solid var(--line);border-radius:9px}
  .x{font-family:Anton;color:var(--muted);font-size:16px}
  .gsub{font-size:11.5px;color:var(--muted);padding:0 13px 4px}
  table.palp{width:100%;border-collapse:collapse;border-top:1px solid var(--line)}
  table.palp td{padding:7px 13px;font-size:13px;border-bottom:1px solid rgba(28,74,48,.5)}
  table.palp tr:last-child td{border-bottom:none}
  table.palp .pn{text-align:left;font-weight:700}
  table.palp .pp{text-align:center;font-family:Anton;letter-spacing:.04em;color:var(--muted)}
  table.palp .pt2{text-align:right;width:58px}
  table.palp tr.hl{background:rgba(35,201,100,.09)}
  table.palp tr.hl .pn{color:var(--grass)}
  .ptag{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
  .ptag.p10{background:var(--gold);color:#1a1400}
  .ptag.p5{background:rgba(35,201,100,.18);color:var(--grass)}
  .ptag.p0{background:rgba(255,90,95,.14);color:var(--coral)}
  .ptag.pn{color:var(--muted)}

  .live-banner{display:flex;align-items:center;gap:9px;background:linear-gradient(90deg,rgba(255,90,95,.16),rgba(255,90,95,.04));
    border:1px solid rgba(255,90,95,.4);border-radius:11px;padding:10px 13px;margin:0 0 11px;
    font-size:12.5px;font-weight:600;color:#ffd9da}
  .live-banner .lp{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--coral);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,95,.55)}70%{box-shadow:0 0 0 8px rgba(255,90,95,0)}100%{box-shadow:0 0 0 0 rgba(255,90,95,0)}}

  .note{font-size:12px;color:var(--muted);text-align:center;margin:22px 0 0;line-height:1.7}
  .note b{color:var(--cream)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);
    background:var(--grass);color:#062012;font-weight:800;padding:10px 18px;border-radius:999px;
    box-shadow:var(--shadow);opacity:0;transition:.2s;pointer-events:none;z-index:50;font-size:13px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .modal{display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex}
  .modal .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;max-width:420px;width:100%;box-shadow:var(--shadow)}
  .modal h2{font-family:Anton;font-weight:400;font-size:19px;letter-spacing:.04em;text-transform:uppercase;margin:0 0 12px}
  .names{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
  .names button{background:var(--panel2);border:1px solid var(--line);color:var(--cream);border-radius:10px;
    padding:11px 8px;font:inherit;font-weight:700;cursor:pointer}
  .names button:active{border-color:var(--grass)}
</style>
</head>
<body>

<header class="board"><div class="inner">
  <div class="eyebrow">Rumo ao Hexa &nbsp;·&nbsp; 2026</div>
  <h1>Bolão da <span class="ball">⚽</span> Copa</h1>
  <div class="leadline" id="leadline"></div>
</div></header>

<div class="wrap">
  <div class="me">
    <span class="pill" id="mePill">Toque no seu nome pra te destacar</span>
    <button class="linkbtn" id="pickMe">escolher meu nome</button>
  </div>

  <div class="section-h">Classificação <span class="dot"></span></div>
  <div class="podium" id="podium"></div>
  <div id="rankList"></div>

  <div class="section-h" style="margin-top:26px">Jogos &amp; palpites <span class="dot"></span></div>
  <div class="tabs" id="tabs"></div>
  <div id="games"></div>

  <p class="note">
    <b>Pontuação:</b> placar exato = 10 · só o vencedor/empate = 5 · errou = 0.<br>
    <span id="stamp"></span>
  </p>
</div>

<div class="modal" id="modal"><div class="card">
  <h2>Quem é você?</h2>
  <div class="names" id="names"></div>
</div></div>

<div class="toast" id="toast"></div>

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1500);}
function sign(n){return n>0?1:n<0?-1:0;}
function score(p,o){ if(!p||!o)return null;
  if(p[0]===o[0]&&p[1]===o[1])return 10;
  return sign(p[0]-p[1])===sign(o[0]-o[1])?5:0; }
function standings(){
  const rows=PLAYERS.map(p=>{let tot=0,c10=0,c5=0,c0=0;
    for(const g of GAMES){const o=RESULTS[g[0]];if(!o)continue;
      const s=score(PALPITES[p][g[0]],o);if(s===null)continue;
      tot+=s;if(s===10)c10++;else if(s===5)c5++;else c0++;}
    return{p,tot,c10,c5,c0};});
  rows.sort((a,b)=>b.tot-a.tot||b.c10-a.c10||a.p.localeCompare(b.p));
  return rows;
}
function renderLead(){
  const s=standings(), played=Object.keys(RESULTS).length;
  document.getElementById('leadline').innerHTML=`Líder: <b>${s[0].p}</b> com <b>${s[0].tot} pts</b> · ${played} de ${GAMES.length} jogos apurados`;

  const pod=document.getElementById('podium'); pod.innerHTML='';
  [1,0,2].forEach(i=>{const r=s[i];if(!r){pod.innerHTML+='<div></div>';return;}
    pod.innerHTML+=`<div class="step s${i+1}"><div class="pos">${i+1}º</div><div class="nm">${r.p}</div><div class="pt">${r.tot}</div></div>`;});
  const list=document.getElementById('rankList'); list.innerHTML='';
  s.forEach((r,i)=>{
    const pos=MEDAL[i]||(i+1)+'º';
    list.innerHTML+=`<div class="rrow ${r.p===me?'hl':''}" data-pl="${r.p}">
      <div class="rpos">${pos}</div>
      <div class="rmid"><div class="rname">${r.p}</div>
        <div class="rsub">${r.c10} cravado(s) · ${r.c5} vencedor(es) · ${r.c0} erro(s)</div></div>
      <div class="rpts">${r.tot}<span>pts</span></div></div>`;
  });
  renderLead();
}
function renderTabs(){
  const rounds=[...new Set(GAMES.map(g=>g[1]))];
  const t=document.getElementById('tabs'); t.innerHTML='';
  rounds.forEach(r=>{const date=GAMES.find(g=>g[1]===r)[2];
    const live=GAMES.some(g=>g[1]===r&&!RESULTS[g[0]]);
    const b=document.createElement('button');
    b.className='tab'+(r===curRound?' on':'');
    b.innerHTML='Rod. '+r+' · '+date+(live?'<span class="ld"></span>':'');
    b.onclick=()=>{curRound=r;renderTabs();renderGames();};
    t.appendChild(b);});
}
function renderGames(){
  const box=document.getElementById('games'); box.innerHTML='';
  const rg=GAMES.filter(g=>g[1]===curRound);
  const pending=rg.filter(g=>!RESULTS[g[0]]).length;
  if(pending>0){const b=document.createElement('div');b.className='live-banner';
    b.innerHTML=(pending===rg.length)
      ?`<span class="lp"></span> Rodada ${curRound} em andamento — resultados em breve.`
      :`<span class="lp"></span> Rodada ${curRound}: ${pending} jogo(s) ainda sem resultado.`;
    box.appendChild(b);}
  rg.forEach(g=>{
    const [key,rod,date,hf,hn,af,an]=g, off=RESULTS[key];
    let rows='';
    PLAYERS.forEach(p=>{const pal=PALPITES[p][key], s=(off&&pal)?score(pal,off):null;
      const tag=s===10?'<span class="ptag p10">+10</span>':s===5?'<span class="ptag p5">+5</span>':s===0?'<span class="ptag p0">0</span>':'<span class="ptag pn">—</span>';
      const pp = pal ? (pal[0]+' × '+pal[1]) : '<span style="color:var(--muted)">sem palpite</span>';
      rows+=`<tr class="${p===me?'hl':''}" data-pl="${p}"><td class="pn">${p}</td><td class="pp">${pp}</td><td class="pt2">${pal?tag:''}</td></tr>`;});
    const card=document.createElement('div'); card.className='game';
    card.innerHTML=`
      <div class="top"><span>Jogo · ${date}</span><span class="badge ${off?'done':'open'}">${off?'Encerrado':'Aguardando'}</span></div>
      <div class="match">
        <div class="team"><span class="flag">${hf}</span><span class="tname">${hn}</span></div>
        <div class="scorebox"><div class="rscore">${off?off[0]:'–'}</div><span class="x">×</span><div class="rscore">${off?off[1]:'–'}</div></div>
        <div class="team away"><span class="tname">${an}</span><span class="flag">${af}</span></div>
      </div>
      <div class="gsub">${off?'Resultado oficial':'Sem resultado ainda · veja os palpites'}</div>
      <table class="palp"><tbody>${rows}</tbody></table>`;
    box.appendChild(card);
  });
}
function setMe(p){
  me=p; try{localStorage.setItem('bolao_me',p);}catch(e){}
  document.getElementById('mePill').innerHTML='Você é <b>'+p+'</b>';
  document.getElementById('modal').classList.remove('show');
  renderRank(); renderGames(); toast('Show, '+p+'!');
}
function openPicker(){
  const nm=document.getElementById('names'); nm.innerHTML='';
  PLAYERS.forEach(p=>{const b=document.createElement('button');b.textContent=p;b.onclick=()=>setMe(p);nm.appendChild(b);});
  document.getElementById('modal').classList.add('show');
}
document.getElementById('pickMe').onclick=openPicker;
document.getElementById('modal').onclick=e=>{ if(e.target.id==='modal') e.currentTarget.classList.remove('show'); };

const openR=GAMES.find(g=>!RESULTS[g[0]]); curRound=openR?openR[1]:GAMES[GAMES.length-1][1];
if(me) document.getElementById('mePill').innerHTML='Você é <b>'+me+'</b>';
renderTabs(); renderGames(); renderRank();
</script>
</body>
</html>
